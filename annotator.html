    const THEME_KEY = 'nqsh_theme';
    function useTheme() {
      const [theme, setThemeState] = React.useState(() => localStorage.getItem(THEME_KEY) || 'dark');
      const setTheme = (v) => {
        localStorage.setItem(THEME_KEY, v);
        document.documentElement.setAttribute('data-theme', v);
        setThemeState(v);
      };
      React.useEffect(() => { document.documentElement.setAttribute('data-theme', theme); }, []);
      return [theme, setTheme];
    }

    const LANG_KEY = 'nqsh_lang';
    function useLang() {
      const [lang, setLangState] = React.useState(() => localStorage.getItem(LANG_KEY) || 'en');
      const setLang = (l) => {
        localStorage.setItem(LANG_KEY, l);
        document.documentElement.dir  = l === 'ar' ? 'rtl' : 'ltr';
        document.documentElement.lang = l;
        setLangState(l);
      };
      React.useEffect(() => {
        document.documentElement.dir  = lang === 'ar' ? 'rtl' : 'ltr';
        document.documentElement.lang = lang;
      }, []);
      return [lang, setLang];
    }

          <circle cx="9"  cy="35" r="3"   fill="currentColor" opacity="0.55" style={{color:'var(--fg)'}}/>

    function Wordmark({ size = 'text-lg' }) {
      return (
        <span className={`${size} font-sans leading-none`} aria-label="NqshLab">

          <span className="font-normal" style={{color:'var(--teal-link)'}}>Lab</span>

      );
    }


    /* ═══════════════════════════════════════════════════════
       THEME + LANG BUTTONS
    ═══════════════════════════════════════════════════════ */
    function ThemeBtn({ theme, setTheme }) {
      const isDark = theme === 'dark';
      return (
        <button onClick={() => setTheme(isDark ? 'light' : 'dark')}
          title={isDark ? 'Switch to light mode' : 'Switch to night mode'}
          className="flex items-center justify-center w-8 h-8 rounded-lg"
          style={{background:'var(--surface)',color:'var(--fg-lo)',border:'1px solid var(--border-sm)',cursor:'pointer',transition:'all .15s',flexShrink:0}}
          onMouseEnter={e=>{e.currentTarget.style.color='var(--fg)';e.currentTarget.style.borderColor='var(--border)'}}
          onMouseLeave={e=>{e.currentTarget.style.color='var(--fg-lo)';e.currentTarget.style.borderColor='var(--border-sm)'}}>
          {isDark ? (
            <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2} strokeLinecap="round">
              <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
              <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
            </svg>
          ) : (
            <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2} strokeLinecap="round" strokeLinejoin="round">
              <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
            </svg>
          )}
        </button>
      );
    }

    function LangBtn({ lang, setLang }) {
      return (
        <button onClick={() => setLang(lang === 'en' ? 'ar' : 'en')}
          className="font-mono text-xs px-2.5 py-1 rounded-lg"
          style={{background:'var(--surface)',color:'var(--fg-lo)',border:'1px solid var(--border-sm)',cursor:'pointer',transition:'all .15s',letterSpacing:'0.05em',flexShrink:0}}
          onMouseEnter={e=>{e.currentTarget.style.color='var(--fg)';e.currentTarget.style.borderColor='var(--border)'}}
          onMouseLeave={e=>{e.currentTarget.style.color='var(--fg-lo)';e.currentTarget.style.borderColor='var(--border-sm)'}}>
          {lang === 'en' ? 'ع' : 'EN'}
        </button>
      );
    }


    /* ═══════════════════════════════════════════════════════
       LOADING + FORBIDDEN SCREENS
    ═══════════════════════════════════════════════════════ */
    function LoadingScreen() {
      return (
        <div style={{minHeight:'100vh', background:'var(--bg)', display:'flex', alignItems:'center', justifyContent:'center'}}>
          <div style={{width:'40px', height:'40px', border:'3px solid var(--border)', borderTopColor:'#2DD4A5', borderRadius:'50%', animation:'spin 1s linear infinite'}} />
        </div>
      );
    }

    function ForbiddenScreen({ reason, lang }) {
      const t = T[lang] || T.en;
      const isWrongRole = reason === 'wrong_role';
      return (
        <div className="grid-bg min-h-screen flex flex-col items-center justify-center px-4 text-center" style={{background:'var(--bg)'}}>
          <NqshMark size={48} />
          <h1 className="font-display font-normal mt-8 mb-3"
            style={{fontSize:'clamp(1.75rem, 4vw, 2.5rem)', lineHeight:1.1, letterSpacing:'-0.02em', color:'var(--fg)'}}>
            {isWrongRole ? t.wrongRoleHead() : t.notLoggedHead()}
          </h1>
          <p className="text-sm mb-8 max-w-xs" style={{color:'var(--fg-lo)'}}>
            {isWrongRole ? t.wrongRoleSub : t.notLoggedSub}
          </p>
          <a href="standalone.html"
            className="inline-flex items-center gap-2 font-semibold text-sm px-6 py-3 rounded-xl"
            style={{background:'#2DD4A5', color:'#071E1B'}}
            onMouseEnter={e=>e.currentTarget.style.opacity='0.88'}
            onMouseLeave={e=>e.currentTarget.style.opacity='1'}>
            {isWrongRole ? t.backToNqsh : t.signIn}
          </a>
        </div>
      );
    }


    /* ═══════════════════════════════════════════════════════
       DASHBOARD HEADER
    ═══════════════════════════════════════════════════════ */
    function DashboardHeader({ user, onSignOut, lang, setLang, theme, setTheme }) {
      const t = T[lang] || T.en;
      return (
        <header className="sticky top-0 z-50"
          style={{background:'var(--nav-bg)', backdropFilter:'blur(12px)', borderBottom:'1px solid var(--border-sm)'}}>
          <div className="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
            <div className="flex items-center justify-between h-16">

              <div className="flex items-center gap-3">
                <a href="standalone.html" className="flex items-center gap-2.5">
                  <NqshMark size={26} />
                  <Wordmark size="text-[16px]" />
                </a>
                <span className="hidden md:block font-mono text-xs px-2 py-0.5 rounded"
                  style={{color:'var(--fg-vl)', borderLeft:'1px solid var(--border)', marginLeft:'4px', paddingLeft:'12px', letterSpacing:'0.1em'}}>
                  {t.portal}
                </span>
              </div>

              <div className="flex items-center gap-3">
                <ThemeBtn theme={theme} setTheme={setTheme} />
                <LangBtn lang={lang} setLang={setLang} />
                <span className="hidden md:block text-sm font-medium font-sans" style={{color:'var(--fg-lo)'}}>
                  {user.name || user.email}

                <button onClick={onSignOut}
                  className="inline-flex items-center justify-center gap-2 font-semibold text-sm px-4 py-2 rounded-xl"
                  style={{background:'rgba(255,80,60,0.08)', color:'#FF503C', border:'1px solid rgba(255,80,60,0.18)', cursor:'pointer', transition:'opacity .15s'}}
                  onMouseEnter={e=>e.currentTarget.style.opacity='0.8'}
                  onMouseLeave={e=>e.currentTarget.style.opacity='1'}>
                  {t.signOut}
                </button>
              </div>
            </div>
          </div>
        </header>
      );
    }


    /* ═══════════════════════════════════════════════════════
       EARNINGS ROW
    ═══════════════════════════════════════════════════════ */
    function EarningsRow({ earnings, lang }) {
      const t = T[lang] || T.en;
      const cards = [
        { label: t.totalEarned,    value: `$${earnings.totalEarned.toFixed(2)}`,    color: '#2DD4A5',      glow: true  },
        { label: t.pendingPayment, value: `$${earnings.pendingPayment.toFixed(2)}`,  color: '#fbbf24',      glow: false },
        { label: t.tasksCompleted, value: earnings.completedTasks,                   color: 'var(--fg)',    glow: false },
      ];
      return (
        <div className="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
          {cards.map(({ label, value, color, glow }) => (
            <div key={label} className="glass rounded-2xl p-5 md:p-6"
              style={glow ? {boxShadow:'0 0 24px rgba(45,212,165,0.1)'} : {}}>
              <p className="font-mono text-xs uppercase tracking-widest mb-3"
                style={{color:'var(--fg-vl)', letterSpacing:'0.15em'}}>
                {label}
              </p>
              <p className="font-display font-normal"
                style={{fontSize:'clamp(1.5rem, 2.5vw, 2rem)', lineHeight:1, color, letterSpacing:'-0.02em'}}>
                {value}
              </p>
            </div>
          ))}
        </div>
      );
    }


    /* ═══════════════════════════════════════════════════════
       ACTIVE PROJECT CARD
    ═══════════════════════════════════════════════════════ */
    function ActiveProject({ task, onOpen, lang }) {
      const t = T[lang] || T.en;
      return (
        <div className="glass-teal rounded-2xl p-6 md:p-8 mb-8"
          style={{border:'1.5px solid rgba(45,212,165,0.3)', boxShadow:'0 0 32px rgba(45,212,165,0.07)'}}>
          <p className="font-mono text-xs uppercase tracking-widest mb-3"
            style={{color:'rgba(45,212,165,0.6)', letterSpacing:'0.18em'}}>
            {t.currentProject}
          </p>
          <div className="flex items-start justify-between gap-6 flex-wrap mb-5">
            <div className="flex-1 min-w-0">
              <h3 className="font-display font-normal mb-2"
                style={{fontSize:'clamp(1.2rem, 2.5vw, 1.5rem)', lineHeight:1.15, letterSpacing:'-0.02em', color:'var(--fg)'}}>
                {task.title}
              </h3>
              <p className="text-sm leading-relaxed" style={{color:'var(--fg-lo)'}}>{task.description}</p>
            </div>
            <div className="flex-shrink-0 text-right">
              <p className="font-mono text-xs mb-1" style={{color:'var(--fg-vl)'}}>{t.expectedPayment}</p>
              <p className="font-display font-normal" style={{fontSize:'1.75rem', color:'#2DD4A5', lineHeight:1, letterSpacing:'-0.02em'}}>
                ${task.rewardUSD.toFixed(2)}
              </p>
            </div>
          </div>
          <button onClick={() => onOpen(task)}
            className="inline-flex items-center gap-2 font-semibold text-sm px-6 py-3 rounded-xl"
            style={{background:'#2DD4A5', color:'#071E1B', border:'none', cursor:'pointer', transition:'opacity .15s'}}
            onMouseEnter={e=>e.currentTarget.style.opacity='0.88'}
            onMouseLeave={e=>e.currentTarget.style.opacity='1'}>
            {t.continueWorking}
            <ArrowRightIcon className="w-3.5 h-3.5" />
          </button>
        </div>
      );
    }


    /* ═══════════════════════════════════════════════════════
       TASK CARD
    ═══════════════════════════════════════════════════════ */
    const DIFFICULTY_STYLE = {
      easy:   { color:'#4ade80', bg:'rgba(74,222,128,0.08)',  border:'rgba(74,222,128,0.2)'  },
      medium: { color:'#fbbf24', bg:'rgba(251,191,36,0.08)',  border:'rgba(251,191,36,0.2)'  },
      hard:   { color:'#f87171', bg:'rgba(248,113,113,0.08)', border:'rgba(248,113,113,0.2)' },
    };

    function TaskCard({ task, onOpen, lang }) {
      const [hovered, setHovered] = useState(false);
      const t = T[lang] || T.en;
      const diff = DIFFICULTY_STYLE[task.difficulty] || DIFFICULTY_STYLE.medium;
      const inProgress = task.status === 'in_progress';

      return (
        <div className="rounded-2xl p-5 md:p-6 flex flex-col gap-4 cursor-pointer"
          style={{
            background: hovered ? 'rgba(45,212,165,0.06)' : 'var(--surface)',
            border: `1px solid ${hovered ? 'var(--border-hi)' : 'var(--border)'}`,
            transition: 'all .18s',
          }}
          onMouseEnter={() => setHovered(true)}
          onMouseLeave={() => setHovered(false)}>

          {/* Top row */}
          <div className="flex items-center justify-between gap-2 flex-wrap">
            <span className="font-mono text-xs px-2.5 py-1 rounded-full"
              style={{background:'rgba(45,212,165,0.08)', color:'#2DD4A5', border:'1px solid rgba(45,212,165,0.2)', letterSpacing:'0.08em'}}>
              {task.domain}
            </span>
            {inProgress && (
              <span className="font-mono text-xs px-2.5 py-1 rounded-full"
                style={{background:'rgba(251,191,36,0.08)', color:'#fbbf24', border:'1px solid rgba(251,191,36,0.22)', letterSpacing:'0.06em'}}>
                {t.inProgress}
              </span>
            )}
          </div>

          {/* Title + description */}
          <div>
            <h3 className="font-semibold text-sm mb-1.5" style={{color:'var(--fg)'}}>{task.title}</h3>
            <p className="text-xs leading-relaxed"
              style={{
                color:'var(--fg-lo)',
                display:'-webkit-box',
                WebkitLineClamp:2,
                WebkitBoxOrient:'vertical',
                overflow:'hidden',
              }}>
              {task.description}
            </p>
          </div>

          {/* Metadata */}
          <div className="flex items-center gap-3 flex-wrap">
            <span className="flex items-center gap-1.5 font-mono text-xs" style={{color:'var(--fg-vl)'}}>
              <ClockIcon />
              ~{task.estimatedMinutes} {t.min}
            </span>
            <span className="font-mono text-xs" style={{color:'var(--fg-ul)'}}>·</span>
            <span className="font-mono text-xs" style={{color:'#2DD4A5'}}>
              ${task.rewardUSD.toFixed(2)}
            </span>
            <span className="font-mono text-xs" style={{color:'var(--fg-ul)'}}>·</span>
            <span className="font-mono text-xs px-2 py-0.5 rounded-full capitalize"
              style={{color: diff.color, background: diff.bg, border:`1px solid ${diff.border}`}}>
              {task.difficulty}
            </span>
            <span className="font-mono text-xs ms-auto" style={{color:'var(--fg-vl)'}}>
              {task.items.length} {t.items}
            </span>
          </div>

          {/* CTA */}
          <button
            onClick={() => onOpen(task)}
            className="w-full font-semibold text-sm py-2.5 rounded-xl flex items-center justify-center gap-2"
            style={{background:'#2DD4A5', color:'#071E1B', border:'none', cursor:'pointer', transition:'opacity .15s'}}
            onMouseEnter={e=>e.currentTarget.style.opacity='0.88'}
            onMouseLeave={e=>e.currentTarget.style.opacity='1'}>
            {inProgress ? t.continueTask : t.startTask}
            <ArrowRightIcon className="w-3.5 h-3.5" />
          </button>
        </div>
      );
    }


    /* ═══════════════════════════════════════════════════════
       TASK LIST
    ═══════════════════════════════════════════════════════ */
    function TaskList({ tasks, annotatorField, onOpen, lang }) {
      const t = T[lang] || T.en;
      const available = tasks.filter(t => t.status === 'available');
      const matched = available.filter(t => !t.requiredField || t.requiredField === annotatorField);

      return (
        <div className="flex flex-col gap-10">
          <div>
            <div className="mono-label">{t.availableProjects}</div>
            {matched.length === 0 ? (
              <div className="glass rounded-2xl p-10 text-center">
                <p className="font-mono text-sm" style={{color:'var(--fg-vl)'}}>
                  {t.noTasks}
                </p>
              </div>
            ) : (
              <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-4">
                {matched.map(task => <TaskCard key={task.id} task={task} onOpen={onOpen} lang={lang} />)}
              </div>
            )}
          </div>
        </div>
      );
    }


    /* ═══════════════════════════════════════════════════════
       ANNOTATION VIEW
    ═══════════════════════════════════════════════════════ */
    function AnnotationView({ task, progress, onAnswer, onNavigate, onSubmit, onBack, lang }) {
      const t = T[lang] || T.en;
      const items = task.items;
      const currentItem = items[progress.currentIndex];
      const answeredCount = Object.keys(progress.answers).length;
      const allAnswered = answeredCount === items.length;
      const currentAnswer = progress.answers[currentItem.id] || null;
      const isPreference = task.type === 'preference';

      return (
        <div className="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 py-8 fade-in">

          {/* Top bar */}
          <div className="flex items-center justify-between mb-6">
            <button onClick={onBack}
              className="flex items-center gap-2 font-mono text-sm"
              style={{color:'var(--fg-vl)', background:'none', border:'none', cursor:'pointer', transition:'color .15s'}}
              onMouseEnter={e=>e.currentTarget.style.color='var(--fg)'}
              onMouseLeave={e=>e.currentTarget.style.color='var(--fg-vl)'}>
              <ArrowLeftIcon className="w-3.5 h-3.5" />
              {t.backToDashboard}
            </button>
            <span className="font-mono text-xs" style={{color:'var(--fg-vl)'}}>
              {progress.currentIndex + 1} / {items.length}
            </span>
          </div>

          {/* Task header */}
          <div className="mb-6">
            <div className="flex items-center gap-2 mb-2">
              <span className="font-mono text-xs px-2.5 py-1 rounded-full"
                style={{background:'rgba(45,212,165,0.08)', color:'#2DD4A5', border:'1px solid rgba(45,212,165,0.2)'}}>
                {task.domain}
              </span>
              <span className="font-mono text-xs" style={{color:'var(--fg-ul)', letterSpacing:'0.1em', textTransform:'uppercase'}}>
                {task.type}
              </span>
            </div>
            <h2 className="font-display font-normal mb-1"
              style={{fontSize:'1.5rem', lineHeight:1.15, letterSpacing:'-0.02em', color:'var(--fg)'}}>
              {task.title}
            </h2>
            <p className="text-sm" style={{color:'var(--fg-lo)'}}>{task.description}</p>
          </div>

          {/* Progress bar */}
          <div className="mb-6 rounded-full overflow-hidden" style={{height:'4px', background:'var(--surface-hi)'}}>
            <div style={{
              height:'100%',
              width:`${(answeredCount / items.length) * 100}%`,
              background:'#2DD4A5',
              borderRadius:'2px',
              transition:'width 0.35s ease',
            }} />
          </div>

          {/* Content pane */}
          {isPreference ? (
            <div className="grid md:grid-cols-2 gap-4 mb-6">
              {['A', 'B'].map(side => (
                <div key={side} className="glass rounded-2xl p-5">
                  <p className="font-mono text-xs uppercase tracking-widest mb-3"
                    style={{color:'var(--fg-vl)', letterSpacing:'0.15em'}}>
                    {side === 'A' ? t.responseA : t.responseB}
                  </p>
                  {currentItem.prompt && (
                    <p className="text-xs mb-3 pb-3 font-mono italic"
                      style={{color:'var(--fg-vl)', borderBottom:'1px solid var(--border)'}}>
                      {t.prompt}: {currentItem.prompt}
                    </p>
                  )}
                  <p className="text-sm leading-relaxed" style={{color:'var(--fg)'}}>
                    {side === 'A' ? currentItem.responseA : currentItem.responseB}
                  </p>
                </div>
              ))}
            </div>
          ) : (
            <div className="glass-teal rounded-2xl p-6 md:p-8 mb-6">
              <p className="font-mono text-xs uppercase tracking-widest mb-4"
                style={{color:'rgba(45,212,165,0.5)', letterSpacing:'0.15em'}}>
                {t.item} {progress.currentIndex + 1}
              </p>
              <p className="text-base leading-relaxed" style={{color:'var(--fg)', lineHeight:1.75}}>
                {currentItem.content}
              </p>
            </div>
          )}

          {/* Label picker */}
          <div className="mb-8">
            <p className="font-mono text-xs uppercase tracking-widest mb-3"
              style={{color:'var(--fg-vl)', letterSpacing:'0.15em'}}>
              {t.yourLabel}
            </p>
            <div className="flex flex-wrap gap-3">
              {task.labels.map(label => {
                const selected = currentAnswer === label;
                return (
                  <button key={label}
                    onClick={() => onAnswer(currentItem.id, label)}
                    className="font-semibold text-sm px-5 py-2.5 rounded-xl"
                    style={{
                      background: selected ? 'rgba(45,212,165,0.15)' : 'var(--surface)',
                      border: `1px solid ${selected ? '#2DD4A5' : 'var(--border)'}`,
                      color: selected ? '#2DD4A5' : 'var(--fg-lo)',
                      cursor: 'pointer',
                      transition: 'all .15s',
                    }}
                    onMouseEnter={e => { if (!selected) { e.currentTarget.style.background = 'var(--surface-hi)'; e.currentTarget.style.color = 'var(--fg)'; } }}
                    onMouseLeave={e => { if (!selected) { e.currentTarget.style.background = 'var(--surface)'; e.currentTarget.style.color = 'var(--fg-lo)'; } }}>
                    {label}
                  </button>
                );
              })}
            </div>
          </div>

          {/* Navigation footer */}
          <div className="flex items-center justify-between">
            <button
              onClick={() => onNavigate('prev')}
              disabled={progress.currentIndex === 0}
              className="flex items-center gap-2 font-semibold text-sm px-5 py-2.5 rounded-xl"
              style={{
                background: 'var(--surface)',
                border: '1px solid var(--border)',
                color: progress.currentIndex === 0 ? 'var(--fg-ul)' : 'var(--fg-lo)',
                cursor: progress.currentIndex === 0 ? 'not-allowed' : 'pointer',
                transition: 'all .15s',
              }}>
              <ArrowLeftIcon className="w-3.5 h-3.5" />
              {t.previous}
            </button>

            <div className="flex items-center gap-3">
              {allAnswered ? (
                <button onClick={onSubmit}
                  className="flex items-center gap-2 font-semibold text-sm px-6 py-2.5 rounded-xl"
                  style={{background:'#2DD4A5', color:'#071E1B', border:'none', cursor:'pointer', transition:'opacity .15s', boxShadow:'0 0 24px rgba(45,212,165,0.25)'}}
                  onMouseEnter={e=>e.currentTarget.style.opacity='0.88'}
                  onMouseLeave={e=>e.currentTarget.style.opacity='1'}>
                  <CheckCircleIcon className="w-4 h-4" />
                  {t.submitAll}
                </button>
              ) : (
                <button
                  onClick={() => onNavigate('next')}
                  disabled={progress.currentIndex === items.length - 1}
                  className="flex items-center gap-2 font-semibold text-sm px-5 py-2.5 rounded-xl"
                  style={{
                    background: currentAnswer ? '#2DD4A5' : 'var(--surface)',
                    border: currentAnswer ? 'none' : '1px solid var(--border)',
                    color: currentAnswer ? '#071E1B' : (progress.currentIndex === items.length - 1 ? 'var(--fg-ul)' : 'var(--fg-lo)'),
                    cursor: progress.currentIndex === items.length - 1 ? 'not-allowed' : 'pointer',
                    transition: 'all .2s',
                  }}>
                  {t.next}
                  <ArrowRightIcon className="w-3.5 h-3.5" />
                </button>
              )}
            </div>
          </div>

          {/* Answered counter hint */}
          {!allAnswered && (
            <p className="text-center font-mono text-xs mt-5" style={{color:'var(--fg-ul)'}}>
              {t.labelProgress(answeredCount, items.length)}
            </p>
          )}
        </div>
      );
    }


    /* ═══════════════════════════════════════════════════════
       APP
    ═══════════════════════════════════════════════════════ */
    function App() {
      const [lang, setLang] = useLang();
      const [theme, setTheme] = useTheme();
      const [authLoading,    setAuthLoading]    = useState(true);
      const [user,           setUser]           = useState(null);
      const [forbiddenReason,setForbiddenReason]= useState(null);
      const [view,           setView]           = useState('loading');
      const [activeTask,     setActiveTask]     = useState(null);
      const [progress,       setProgress]       = useState({ currentIndex: 0, answers: {} });

      const t = T[lang] || T.en;

      useEffect(() => {
        const unsub = auth.onAuthStateChanged((u) => {
          if (!u) {
            setForbiddenReason('not_logged_in');
            setView('forbidden');
          } else {
            const role = localStorage.getItem(`nqsh_role_${u.uid}`);
            if (role !== 'annotator') {
              setForbiddenReason('wrong_role');
              setView('forbidden');
            } else {
              const field  = localStorage.getItem(`nqsh_field_${u.uid}`)  || '';
              const degree = localStorage.getItem(`nqsh_degree_${u.uid}`) || '';
              setUser({ name: u.displayName, email: u.email, field, degree });
              setView('dashboard');
            }
          }
          setAuthLoading(false);
        });
        return () => unsub();
      }, []);

      const handleOpenTask = useCallback((task) => {
        setActiveTask(task);
        setProgress({ currentIndex: 0, answers: {} });
        setView('annotating');
      }, []);

      const handleAnswer = useCallback((itemId, label) => {
        setProgress(p => ({ ...p, answers: { ...p.answers, [itemId]: label } }));
      }, []);

      const handleNavigate = useCallback((direction) => {
        setProgress(p => ({
          ...p,
          currentIndex: direction === 'next'
            ? Math.min(p.currentIndex + 1, activeTask.items.length - 1)
            : Math.max(p.currentIndex - 1, 0),
        }));
      }, [activeTask]);

      const handleSubmit = useCallback(() => {
        // TODO: Firestore write — batch update:
        //   tasks/{task.id}/items/{itemId} → { label, annotatedBy: user.uid, annotatedAt: serverTimestamp() }
        //   tasks/{task.id} → { status: 'completed', completedAt: serverTimestamp() }
        //   annotators/{user.uid}/stats → increment totalCompleted, recalculate accuracyRate
        console.log('Submitting answers for task', activeTask.id, progress.answers);
        setView('dashboard');
        setActiveTask(null);
        setProgress({ currentIndex: 0, answers: {} });
      }, [activeTask, progress]);

      const handleSignOut = useCallback(async () => {
        await auth.signOut();
        setUser(null);
        setForbiddenReason('not_logged_in');
        setView('forbidden');
      }, []);

      if (authLoading) return <LoadingScreen />;
      if (view === 'forbidden') return <ForbiddenScreen reason={forbiddenReason} lang={lang} />;

      const shell = (children) => (
        <div style={{minHeight:'100vh', background:'var(--bg)', color:'var(--fg)', fontFamily:"'ThmanyahSans', system-ui, sans-serif"}}>
          <DashboardHeader user={user} onSignOut={handleSignOut} lang={lang} setLang={setLang} theme={theme} setTheme={setTheme} />
          {children}
        </div>
      );

      if (view === 'annotating' && activeTask) {
        return shell(
          <AnnotationView
            task={activeTask}
            progress={progress}
            onAnswer={handleAnswer}
            onNavigate={handleNavigate}
            onSubmit={handleSubmit}
            onBack={() => { setView('dashboard'); setActiveTask(null); }}
            lang={lang}
          />
        );
      }

      const activeProject = MOCK_TASKS.find(task => task.status === 'in_progress');
      const firstName = (user.name || user.email).split(' ')[0];

      return shell(
        <main className="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-10 fade-in">
          <div className="mb-6">
            <h1 className="font-display font-normal mb-1"
              style={{fontSize:'clamp(1.5rem, 3vw, 2rem)', lineHeight:1.15, letterSpacing:'-0.02em', color:'var(--fg)'}}>
              {t.welcomeBack} <em style={{color:'#2DD4A5', fontStyle:'italic'}}>{firstName}.</em>
            </h1>
            <p className="text-sm font-sans" style={{color:'var(--fg-lo)'}}>
              {user.degree && user.field ? `${user.degree} · ${user.field}` : t.annotatorDash}
            </p>
          </div>
          <EarningsRow earnings={MOCK_EARNINGS} lang={lang} />
          {activeProject && <ActiveProject task={activeProject} onOpen={handleOpenTask} lang={lang} />}
          <TaskList tasks={MOCK_TASKS} annotatorField={user.field} onOpen={handleOpenTask} lang={lang} />
        </main>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
