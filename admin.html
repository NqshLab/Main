      return [theme, setTheme];
    }

    const LANG_KEY = 'nqsh_lang';
    function useLang() {
      const [lang, setLangState] = React.useState(() => localStorage.getItem(LANG_KEY) || 'en');
      const setLang = (l) => {
        localStorage.setItem(LANG_KEY, l);
        document.documentElement.dir  = l === 'ar' ? 'rtl' : 'ltr';
        document.documentElement.lang = l;
        setLangState(l);
      };
      React.useEffect(() => {
        document.documentElement.dir  = lang === 'ar' ? 'rtl' : 'ltr';
        document.documentElement.lang = lang;
      }, []);
      return [lang, setLang];
    }

    function UserForm({ user, onSave, onClose, lang }) {
      const t = T[lang];
      const savedField  = user.field  || '';

      const knownDegree = DEGREE_LEVELS.includes(savedDegree);
      const [form, setForm] = useState({
        name: user.name || '',
        role: user.role || 'annotator',
        field:       knownField  ? savedField  : (savedField  ? EXPERTISE_FIELDS[EXPERTISE_FIELDS.length-1] : ''),
        fieldOther:  knownField  ? ''          : savedField,
        degree:      knownDegree ? savedDegree : (savedDegree ? DEGREE_LEVELS[DEGREE_LEVELS.length-1]       : ''),
        degreeOther: knownDegree ? ''          : savedDegree,
      });
      const set = (k, v) => setForm(f => ({...f, [k]: v}));

      const focusBorder = 'rgba(45,212,165,0.5)';
      const blurBorder  = 'var(--border)';

      return (
        <div className="overlay" onClick={e => { if (e.target === e.currentTarget) onClose(); }}>
          <div className="w-full max-w-md rounded-2xl p-6 md:p-8 overflow-y-auto"

              <div>
                <label style={labelStyle}>{t.emailLbl}</label>
                <input style={{...inputStyle,opacity:0.5,cursor:'default'}} value={user.email} readOnly />
              </div>
              <div>
                <label style={labelStyle}>{t.displayName}</label>
                <input style={inputStyle} value={form.name} onChange={e=>set('name',e.target.value)}
                  onFocus={e=>e.target.style.borderColor=focusBorder}
                  onBlur={e=>e.target.style.borderColor=blurBorder} />
              </div>
              <div>
                <label style={labelStyle}>{t.roleLbl}</label>
                <select style={selectStyle} value={form.role} onChange={e=>set('role',e.target.value)}>
                  <option value="annotator">{t.roles.annotator}</option>
                  <option value="client">{t.roles.client}</option>
                  <option value="admin">{t.roles.admin}</option>
                </select>
              </div>
              {form.role === 'annotator' && (<>
                <div>
                  <label style={labelStyle}>{t.fieldOfExpertise}</label>
                  <select style={selectStyle} value={form.field} onChange={e=>setForm(f=>({...f,field:e.target.value,fieldOther:''}))}>
                    <option value="">{t.noneOpt}</option>
                    {EXPERTISE_FIELDS.map(f => <option key={f} value={f}>{f}</option>)}
                  </select>
                  {form.field === EXPERTISE_FIELDS[EXPERTISE_FIELDS.length-1] && (
                    <input placeholder={t.specifyField} value={form.fieldOther}
                      onChange={e=>set('fieldOther',e.target.value)}
                      style={{...inputStyle,marginTop:'8px'}}
                      onFocus={e=>e.target.style.borderColor=focusBorder}
                      onBlur={e=>e.target.style.borderColor=blurBorder} />
                  )}
                </div>
                <div>
                  <label style={labelStyle}>{t.degreeQual}</label>
                  <select style={selectStyle} value={form.degree} onChange={e=>setForm(f=>({...f,degree:e.target.value,degreeOther:''}))}>
                    <option value="">{t.noneOpt}</option>
                    {DEGREE_LEVELS.map(d => <option key={d} value={d}>{d}</option>)}
                  </select>
                  {form.degree === DEGREE_LEVELS[DEGREE_LEVELS.length-1] && (
                    <input placeholder={t.specifyDegree} value={form.degreeOther}
                      onChange={e=>set('degreeOther',e.target.value)}
                      style={{...inputStyle,marginTop:'8px'}}
                      onFocus={e=>e.target.style.borderColor=focusBorder}
                      onBlur={e=>e.target.style.borderColor=blurBorder} />
                  )}
                </div>
              </>)}
            </div>

            <div className="flex gap-3 mt-7">
              <button onClick={onClose}
                className="flex-1 font-semibold text-sm py-3 rounded-xl"
                style={{background:'var(--surface)',color:'var(--fg-lo)',border:'1px solid var(--border)',cursor:'pointer'}}
                onMouseEnter={e=>e.currentTarget.style.opacity='0.75'}
                onMouseLeave={e=>e.currentTarget.style.opacity='1'}>
                {t.cancel}
              </button>
              <button onClick={() => {
                if (!form.name.trim()) return;
                const isOtherField  = form.field  === EXPERTISE_FIELDS[EXPERTISE_FIELDS.length-1];
                const isOtherDegree = form.degree === DEGREE_LEVELS[DEGREE_LEVELS.length-1];
                onSave({...user, ...form,
                  field:  isOtherField  ? form.fieldOther.trim()  : form.field,
                  degree: isOtherDegree ? form.degreeOther.trim() : form.degree,
                });

                onMouseLeave={e=>e.currentTarget.style.opacity='1'}>
                {t.saveChanges}
              </button>
            </div>
          </div>
        </div>
      );
    }

    /* ═══════════════════════════════════════════════════════
       PROJECT FORM
    ═══════════════════════════════════════════════════════ */
    function ProjectForm({ initial, users, onSave, onClose, lang }) {
      const t = T[lang];
      const clients    = users.filter(u => u.role === 'client');
      const annotators = users.filter(u => u.role === 'annotator');
      const blank = {
        title:'', domain:'Healthcare', type:'classification', description:'',
        status:'scoping', totalItems:'', estimatedDelivery:'', rewardUSD:'',
        clientId:'', annotatorIds:[], requiredField:'Any field',
      };
      const [form, setForm] = useState(initial || blank);
      const [quickDegree, setQuickDegree] = useState('');
      const set = (k, v) => setForm(f => ({...f, [k]: v}));

      const autoAssign = () => {
        if (!quickDegree) return;
        const req = form.requiredField && form.requiredField !== 'Any field';
        const matched = annotators
          .filter(a => a.degree === quickDegree)
          .filter(a => !req || a.field === form.requiredField)
          .map(a => a.uid);
        setForm(f => ({...f, annotatorIds: matched}));
      };

      const toggleAnnotator = (uid) => {
        setForm(f => ({
          ...f,
          annotatorIds: f.annotatorIds.includes(uid)
            ? f.annotatorIds.filter(id => id !== uid)
            : [...f.annotatorIds, uid],
        }));
      };

      const handleSave = () => {
        if (!form.title.trim()) return;
        onSave({
          ...form,
          id: initial?.id || genId(),
          totalItems: parseInt(form.totalItems) || 0,
          completedItems: initial?.completedItems || 0,
          rewardUSD: parseFloat(form.rewardUSD) || 0,
        });
      };

      const req = form.requiredField && form.requiredField !== 'Any field';
      const focusBorder = 'rgba(45,212,165,0.5)';
      const blurBorder  = 'var(--border)';

      return (
        <div className="overlay" onClick={e => { if (e.target === e.currentTarget) onClose(); }}>

                    className="font-semibold text-xs px-4 rounded-xl flex-shrink-0"
                    style={{
                      background: quickDegree ? '#2DD4A5' : 'var(--surface)',
                      color: quickDegree ? '#071E1B' : 'var(--fg-ul)',
                      border:'none', cursor: quickDegree ? 'pointer' : 'default', transition:'all .15s',
                    }}>
                    {t.autoSelect}
                  </button>
                </div>
                <p className="font-mono text-xs mb-2" style={{color:'var(--fg-ul)'}}>
                  {t.selectedCount(form.annotatorIds.length)}
                  {req && ` · ${t.matchesField(form.requiredField)}`}
                </p>
                <div className="flex flex-col gap-2">
                  {annotators.map(a => {
                    const checked = form.annotatorIds.includes(a.uid);
                    const matches = !req || a.field === form.requiredField;
                    return (
                      <button key={a.uid} type="button" onClick={() => toggleAnnotator(a.uid)}
                        className="flex items-center gap-3 p-3 rounded-xl text-left"
                        style={{
                          background: checked ? 'rgba(45,212,165,0.08)' : 'var(--surface)',
                          border:`1px solid ${checked ? 'rgba(45,212,165,0.35)' : matches ? 'rgba(45,212,165,0.12)' : 'var(--border)'}`,
                          cursor:'pointer', transition:'all .15s',
                          opacity: req && !matches ? 0.4 : 1,
                        }}>
                        <span style={{
                          width:'14px', height:'14px', borderRadius:'3px', flexShrink:0,
                          border:`2px solid ${checked ? '#2DD4A5' : 'var(--border-hi)'}`,
                          background: checked ? '#2DD4A5' : 'transparent',
                          display:'flex', alignItems:'center', justifyContent:'center',
                        }}>
                          {checked && <svg width="8" height="8" fill="none" viewBox="0 0 24 24" stroke="#071E1B" strokeWidth={3.5}><path strokeLinecap="round" strokeLinejoin="round" d="M5 13l4 4L19 7"/></svg>}
                        </span>
                        <div style={{flex:1,minWidth:0}}>
                          <p className="text-sm font-medium" style={{color: checked ? 'var(--fg)' : 'var(--fg-md)'}}>
                            {matches && req && <span style={{color:'#2DD4A5',marginRight:'4px'}}>★</span>}
                            {a.name}
                          </p>
                          <p className="font-mono text-xs" style={{color:'var(--fg-ul)'}}>
                            {[a.degree, a.field].filter(Boolean).join(' · ')} · {a.email}
                          </p>
                        </div>
                      </button>
                    );
                  })}
                </div>
              </div>
            </div>

            <div className="flex gap-3 mt-7">
              <button onClick={onClose}
                className="flex-1 font-semibold text-sm py-3 rounded-xl"
                style={{background:'var(--surface)',color:'var(--fg-lo)',border:'1px solid var(--border)',cursor:'pointer'}}
                onMouseEnter={e=>e.currentTarget.style.opacity='0.75'}
                onMouseLeave={e=>e.currentTarget.style.opacity='1'}>
                {t.cancel}
              </button>
              <button onClick={handleSave}
                className="flex-1 font-semibold text-sm py-3 rounded-xl"
                style={{background:'#2DD4A5',color:'#071E1B',border:'none',cursor:'pointer'}}
                onMouseEnter={e=>e.currentTarget.style.opacity='0.88'}
                onMouseLeave={e=>e.currentTarget.style.opacity='1'}>
                {initial ? t.saveChanges : t.createProject}
              </button>
            </div>
          </div>
        </div>
      );
    }

    /* ═══════════════════════════════════════════════════════
       CONFIRM DELETE
    ═══════════════════════════════════════════════════════ */
    function ConfirmDelete({ title, onConfirm, onClose, lang }) {

        <div className="overlay" onClick={e => { if (e.target === e.currentTarget) onClose(); }}>
          <div className="w-full max-w-sm rounded-2xl p-7 text-center"

              <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="#FF503C" strokeWidth={2}>
                <path strokeLinecap="round" strokeLinejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />

              <button onClick={onConfirm}

                {t.delete}

            </div>
          </div>
        </div>
      );

    /* ═══════════════════════════════════════════════════════
       PROJECTS TAB
    ═══════════════════════════════════════════════════════ */
    function ProjectsTab({ projects, users, onAdd, onEdit, onDelete, lang }) {
      const t = T[lang];
      const getUser = uid => users.find(u => u.uid === uid);

      return (
        <div className="fade-in">
          <div className="flex items-center justify-between mb-6">
            <div>
              <h2 className="font-display font-normal" style={{fontSize:'1.5rem',letterSpacing:'-0.02em',color:'var(--fg)'}}>{t.projectsTitle}</h2>
              <p className="text-sm mt-0.5" style={{color:'var(--fg-lo)'}}>
                {t.projectsCount(projects.length, projects.filter(p=>p.status==='in_progress').length)}
              </p>
            </div>
            <button onClick={onAdd}
              className="inline-flex items-center gap-2 font-semibold text-sm px-5 py-2.5 rounded-xl"
              style={{background:'#2DD4A5',color:'#071E1B',border:'none',cursor:'pointer',transition:'opacity .15s'}}
              onMouseEnter={e=>e.currentTarget.style.opacity='0.88'}
              onMouseLeave={e=>e.currentTarget.style.opacity='1'}>
              {t.newProjectBtn}
            </button>
          </div>

          <div className="flex flex-col gap-3">
            {projects.map(proj => {
              const sc     = STATUS_COLOR[proj.status] || STATUS_COLOR.scoping;
              const client = getUser(proj.clientId);
              const annots = proj.annotatorIds.map(id => getUser(id)).filter(Boolean);
              const pct    = proj.totalItems > 0 ? Math.round((proj.completedItems/proj.totalItems)*100) : 0;
              return (
                <div key={proj.id} className="glass rounded-2xl p-5 md:p-6">
                  <div className="flex flex-col md:flex-row md:items-start gap-4">
                    <div className="flex-1 min-w-0">
                      <div className="flex items-center gap-2 mb-2 flex-wrap">
                        <span className="font-mono text-xs px-2.5 py-0.5 rounded-full"
                          style={{background:'rgba(45,212,165,0.08)',color:'#2DD4A5',border:'1px solid rgba(45,212,165,0.2)'}}>
                          {proj.domain}
                        </span>
                        <span className="font-mono text-xs px-2.5 py-0.5 rounded-full"
                          style={{background:sc.bg,color:sc.color,border:`1px solid ${sc.border}`}}>
                          {t.statuses[proj.status]}
                        </span>
                        <span className="font-mono text-xs" style={{color:'var(--fg-ul)',letterSpacing:'0.08em',textTransform:'uppercase'}}>
                          {proj.type}
                        </span>
                      </div>
                      <h3 className="font-semibold text-base mb-1" style={{color:'var(--fg)'}}>{proj.title}</h3>
                      <p className="text-xs mb-3" style={{color:'var(--fg-lo)',display:'-webkit-box',WebkitLineClamp:1,WebkitBoxOrient:'vertical',overflow:'hidden'}}>
                        {proj.description}
                      </p>
                      <div className="flex flex-wrap gap-4 text-xs font-mono">
                        <span style={{color:'var(--fg-vl)'}}>
                          {t.clientLbl}: <span style={{color:client?'var(--fg)':'var(--fg-ul)'}}>{client?client.name:t.unassigned}</span>
                        </span>
                        {proj.requiredField && proj.requiredField !== 'Any field' && (
                          <span style={{color:'var(--fg-vl)'}}>
                            {t.requiresLbl}: <span style={{color:'#2DD4A5'}}>{proj.requiredField}</span>
                          </span>
                        )}
                        <span style={{color:'var(--fg-vl)'}}>
                          {t.annotatorsLbl}: <span style={{color:annots.length?'var(--fg)':'var(--fg-ul)'}}>
                            {annots.length ? annots.map(a=>`${a.name.split(' ')[0]} (${a.degree} ${a.field})`).join(', ') : t.noneAnnotators}
                          </span>
                        </span>
                        {proj.totalItems > 0 && <span style={{color:'var(--fg-vl)'}}>{t.progressLbl}: <span style={{color:'#2DD4A5'}}>{pct}%</span></span>}
                        {proj.rewardUSD > 0 && <span style={{color:'var(--fg-vl)'}}>{t.budgetCol}: <span style={{color:'var(--fg)'}}>${proj.rewardUSD.toLocaleString()}</span></span>}
                      </div>
                    </div>
                    <div className="flex items-center gap-2 flex-shrink-0">
                      <button onClick={()=>onEdit(proj)}
                        className="font-semibold text-xs px-4 py-2 rounded-lg"
                        style={{background:'var(--surface)',color:'var(--fg-lo)',border:'1px solid var(--border)',cursor:'pointer',transition:'all .15s'}}
                        onMouseEnter={e=>{e.currentTarget.style.background='rgba(45,212,165,0.1)';e.currentTarget.style.color='#2DD4A5';}}
                        onMouseLeave={e=>{e.currentTarget.style.background='var(--surface)';e.currentTarget.style.color='var(--fg-lo)';}}>
                        {t.editBtn}
                      </button>
                      <button onClick={()=>onDelete(proj)}
                        className="font-semibold text-xs px-4 py-2 rounded-lg"
                        style={{background:'rgba(255,80,60,0.07)',color:'#FF503C',border:'1px solid rgba(255,80,60,0.18)',cursor:'pointer',transition:'opacity .15s'}}
                        onMouseEnter={e=>e.currentTarget.style.opacity='0.7'}
                        onMouseLeave={e=>e.currentTarget.style.opacity='1'}>
                        {t.deleteBtn}
                      </button>
                    </div>
                  </div>
                  {proj.totalItems > 0 && (
                    <div className="mt-4 rounded-full overflow-hidden" style={{height:'3px',background:'var(--surface-hi)'}}>
                      <div style={{height:'100%',width:`${pct}%`,background:'rgba(45,212,165,0.6)',borderRadius:'2px',transition:'width 0.3s'}} />
                    </div>
                  )}
                </div>
              );
            })}
            {projects.length === 0 && (
              <div className="glass rounded-2xl p-12 text-center">
                <p className="font-mono text-sm" style={{color:'var(--fg-ul)'}}>{t.noProjects}</p>
              </div>
            )}
          </div>
        </div>
      );
    }

    /* ═══════════════════════════════════════════════════════
       USERS TAB
    ═══════════════════════════════════════════════════════ */
    function UsersTab({ users, projects, onEditUser, lang }) {
      const t = T[lang];
      const [fieldFilter,  setFieldFilter]  = useState('All');
      const [degreeFilter, setDegreeFilter] = useState('All');

      const clients       = users.filter(u => u.role === 'client');
      const allAnnotators = users.filter(u => u.role === 'annotator');
      const annotators    = allAnnotators
        .filter(u => fieldFilter  === 'All' || u.field  === fieldFilter)
        .filter(u => degreeFilter === 'All' || u.degree === degreeFilter);

      const uniqueFields = [...new Set(allAnnotators.map(u=>u.field).filter(Boolean))].sort();
      const projectsFor  = uid => projects.filter(p => p.clientId === uid || p.annotatorIds.includes(uid));

      const smBtn = {
        fontFamily:"'ThmanyahSans',system-ui,sans-serif", fontWeight:600, fontSize:'11px',
        padding:'4px 10px', borderRadius:'8px', cursor:'pointer', transition:'all .15s',
      };

      return (
        <div className="fade-in">
          <div className="mb-6">
            <h2 className="font-display font-normal" style={{fontSize:'1.5rem',letterSpacing:'-0.02em',color:'var(--fg)'}}>{t.usersTitle}</h2>
            <p className="text-sm mt-0.5" style={{color:'var(--fg-lo)'}}>
              {t.usersCount(clients.length, allAnnotators.length)}
            </p>
          </div>

          <div className="grid md:grid-cols-2 gap-8">
            <div>
              <div className="mono-label">{t.clientsSection}</div>
              <div className="flex flex-col gap-3">
                {clients.map(u => (
                  <div key={u.uid} className="glass rounded-xl p-4">
                    <div className="flex items-start justify-between gap-2">
                      <div>
                        <p className="font-semibold text-sm" style={{color:'var(--fg)'}}>{u.name}</p>
                        <p className="font-mono text-xs mb-2" style={{color:'var(--fg-vl)'}}>{u.email}</p>
                      </div>
                      <button onClick={()=>onEditUser(u)}
                        style={{...smBtn,background:'var(--surface)',color:'var(--fg-lo)',border:'1px solid var(--border)'}}
                        onMouseEnter={e=>{e.currentTarget.style.background='rgba(45,212,165,0.08)';e.currentTarget.style.color='#2DD4A5';}}
                        onMouseLeave={e=>{e.currentTarget.style.background='var(--surface)';e.currentTarget.style.color='var(--fg-lo)';}}>
                        {t.editBtn}
                      </button>
                    </div>
                    {projectsFor(u.uid).length > 0 ? (
                      <div className="flex flex-wrap gap-1.5 mt-1">
                        {projectsFor(u.uid).map(p => {
                          const sc = STATUS_COLOR[p.status];
                          return (
                            <span key={p.id} className="font-mono text-xs px-2 py-0.5 rounded-full"
                              style={{background:sc.bg,color:sc.color,border:`1px solid ${sc.border}`}}>
                              {p.title.length>22?p.title.slice(0,22)+'…':p.title}
                            </span>
                          );

                      </div>

                      <p className="font-mono text-xs mt-1" style={{color:'var(--fg-ul)'}}>{t.noProjectsAssigned}</p>

                ))}
                {clients.length === 0 && <p className="font-mono text-xs" style={{color:'var(--fg-ul)'}}>{t.noClients}</p>}
              </div>
            </div>

            <div>
              <div className="mono-label">{t.annotatorsSection}</div>
              <div className="flex gap-2 mb-4">
                <select value={fieldFilter} onChange={e=>setFieldFilter(e.target.value)}
                  style={{...selectStyle,flex:1,padding:'7px 10px',fontSize:'12px'}}>
                  <option value="All">{t.allFields}</option>
                  {uniqueFields.map(f=><option key={f} value={f}>{f}</option>)}
                </select>
                <select value={degreeFilter} onChange={e=>setDegreeFilter(e.target.value)}
                  style={{...selectStyle,flex:1,padding:'7px 10px',fontSize:'12px'}}>
                  <option value="All">{t.allDegrees}</option>
                  {DEGREE_LEVELS.map(d=><option key={d} value={d}>{d}</option>)}
                </select>
              </div>
              {(fieldFilter !== 'All' || degreeFilter !== 'All') && (
                <p className="font-mono text-xs mb-3" style={{color:'var(--fg-vl)'}}>
                  {t.shownOf(annotators.length, allAnnotators.length)}
                </p>
              )}
              <div className="flex flex-col gap-3">
                {annotators.map(u => (
                  <div key={u.uid} className="glass rounded-xl p-4">
                    <div className="flex items-start justify-between gap-2 mb-2">
                      <div className="flex-1 min-w-0">
                        <p className="font-semibold text-sm" style={{color:'var(--fg)'}}>{u.name}</p>
                        <p className="font-mono text-xs" style={{color:'var(--fg-vl)'}}>{u.email}</p>
                      </div>
                      {u.field && (
                        <div className="flex flex-col items-end gap-1 flex-shrink-0">
                          <span className="font-mono text-xs px-2 py-0.5 rounded-full"
                            style={{background:'rgba(45,212,165,0.08)',color:'#2DD4A5',border:'1px solid rgba(45,212,165,0.2)'}}>
                            {u.field}
                          </span>
                          {u.degree && (
                            <span className="font-mono text-xs px-2 py-0.5 rounded-full"
                              style={{background:'var(--surface)',color:'var(--fg-lo)',border:'1px solid var(--border)'}}>
                              {u.degree}
                            </span>
                          )}
                        </div>
                      )}
                    </div>
                    <div className="flex gap-2 mb-2">
                      <button onClick={()=>onEditUser(u)}
                        style={{...smBtn,background:'var(--surface)',color:'var(--fg-lo)',border:'1px solid var(--border)'}}
                        onMouseEnter={e=>{e.currentTarget.style.background='rgba(45,212,165,0.08)';e.currentTarget.style.color='#2DD4A5';}}
                        onMouseLeave={e=>{e.currentTarget.style.background='var(--surface)';e.currentTarget.style.color='var(--fg-lo)';}}>
                        {t.editBtn}
                      </button>
                    </div>
                    {projectsFor(u.uid).length > 0 ? (
                      <div className="flex flex-wrap gap-1.5 mt-1">
                        {projectsFor(u.uid).map(p => {
                          const sc = STATUS_COLOR[p.status];
                          return (
                            <span key={p.id} className="font-mono text-xs px-2 py-0.5 rounded-full"
                              style={{background:sc.bg,color:sc.color,border:`1px solid ${sc.border}`}}>
                              {p.title.length>22?p.title.slice(0,22)+'…':p.title}
                            </span>
                          );
                        })}
                      </div>
                    ) : (
                      <p className="font-mono text-xs mt-1" style={{color:'var(--fg-ul)'}}>{t.notAssigned}</p>
                    )}
                  </div>
                ))}
                {annotators.length === 0 && (
                  <div className="glass rounded-xl p-6 text-center">
                    <p className="font-mono text-xs" style={{color:'var(--fg-ul)'}}>
                      {allAnnotators.length === 0 ? t.noAnnotators : t.noAnnotatorsFilter}
                    </p>
                  </div>
                )}
              </div>
            </div>
          </div>
        </div>
      );
    }

                          <span className="font-mono text-xs px-2.5 py-0.5 rounded-full"

                            {t.statuses[proj.status]}
                          </span>

                        <h3 className="font-semibold text-base" style={{color:'var(--fg)'}}>{proj.title}</h3>
                        {proj.totalItems > 0 && (
                          <p className="font-mono text-xs mt-1" style={{color:'var(--fg-vl)'}}>

                          <span className="font-mono text-sm font-medium" style={{color:'#2DD4A5'}}>${proj.rewardUSD.toLocaleString()}</span>

                      </div>
                    </div>
                    {proj.totalItems > 0 && (
                      <div className="mt-4 rounded-full overflow-hidden" style={{height:'3px',background:'var(--surface-hi)'}}>

                      </div>
                    )}
                  </button>
                  {isOpen && (
                    <div className="px-5 md:px-6 pb-5 pt-0" style={{borderTop:'1px solid var(--border)'}}>
                      <p className="text-sm mt-4 mb-4" style={{color:'var(--fg-lo)'}}>{proj.description}</p>
                      <div className="flex flex-wrap gap-4 text-xs font-mono">
                        <span style={{color:'var(--fg-vl)'}}>
                          {t.clientLbl}: <span style={{color:client?'var(--fg)':'var(--fg-ul)'}}>{client?.name||'— none —'}</span>
                        </span>
                        {proj.startDate && <span style={{color:'var(--fg-vl)'}}>{t.started}: <span style={{color:'var(--fg)'}}>{proj.startDate}</span></span>}
                        {proj.estimatedDelivery && <span style={{color:'var(--fg-vl)'}}>{t.estDelivery2}: <span style={{color:'var(--fg)'}}>{proj.estimatedDelivery}</span></span>}
                        <span style={{color:'var(--fg-vl)'}}>{t.annotatorsLbl}: <span style={{color:'var(--fg)'}}>{proj.annotatorIds.length}</span></span>
                        {proj.requiredField && proj.requiredField !== 'Any field' && (
                          <span style={{color:'var(--fg-vl)'}}>{t.requiresLbl}: <span style={{color:'#2DD4A5'}}>{proj.requiredField}</span></span>
                        )}
                      </div>
                    </div>
                  )}
                </div>
              );
            })}
            {projects.length === 0 && (
              <div className="glass rounded-2xl p-12 text-center">
                <p className="font-mono text-sm" style={{color:'var(--fg-ul)'}}>{t.noProjectsYet}</p>
              </div>
            )}
          </div>
        </div>
      );
    }

    /* ═══════════════════════════════════════════════════════
       ANNOTATOR VIEW
    ═══════════════════════════════════════════════════════ */
    function AnnotatorView({ adminUser, projects, lang }) {
      const t = T[lang];
      const uid    = adminUser.uid;
      const field  = localStorage.getItem(`nqsh_field_${uid}`)  || '';
      const degree = localStorage.getItem(`nqsh_degree_${uid}`) || '';

      const assigned  = projects.filter(p => p.annotatorIds.includes(uid));
      const active    = assigned.find(p => p.status === 'in_progress');
      const available = projects.filter(p => {
        if (p.annotatorIds.includes(uid)) return false;
        if (p.status !== 'scoping' && p.status !== 'in_progress') return false;
        return !p.requiredField || p.requiredField === 'Any field' || p.requiredField === field;
      });

      const earned    = assigned.filter(p=>p.status==='delivered').reduce((s,p)=>s+p.rewardUSD/Math.max(p.annotatorIds.length,1),0);
      const pending   = assigned.filter(p=>p.status==='in_review' ).reduce((s,p)=>s+p.rewardUSD/Math.max(p.annotatorIds.length,1),0);
      const completed = assigned.filter(p=>p.status==='delivered').length;
      const noProfile = !field && !degree;

      return (
        <div className="fade-in">
          <div className="flex items-start justify-between mb-8">
            <div>
              <h2 className="font-display font-normal" style={{fontSize:'1.5rem',letterSpacing:'-0.02em',color:'var(--fg)'}}>
                {adminUser.name || adminUser.email}
              </h2>
              {(field || degree) ? (
                <p className="font-mono text-sm mt-1" style={{color:'var(--fg-lo)'}}>
                  {[degree, field].filter(Boolean).join(' · ')}
                </p>
              ) : (
                <p className="font-mono text-xs mt-1" style={{color:'rgba(255,80,60,0.7)'}}>
                  {t.noProfileMsg}
                </p>
              )}
            </div>
            <span className="font-mono text-xs px-3 py-1 rounded-full flex-shrink-0"
              style={{background:'rgba(45,212,165,0.08)',color:'#2DD4A5',border:'1px solid rgba(45,212,165,0.2)'}}>
              {t.annotatorViewBadge}
            </span>
          </div>

          <div className="grid grid-cols-3 gap-4 mb-8">
            {[
              { label: t.earnedLbl,    value:`$${earned.toFixed(2)}`,  color:'#2DD4A5', glow:true  },
              { label: t.pendingLbl,   value:`$${pending.toFixed(2)}`, color:'#fbbf24', glow:false },
              { label: t.completedLbl, value: completed,               color:'var(--fg)', glow:false },
            ].map(card => (
              <div key={card.label} className="glass rounded-2xl p-5 text-center"
                style={card.glow ? {boxShadow:'0 0 24px rgba(45,212,165,0.06)'} : {}}>
                <p className="font-mono text-xs mb-2" style={{color:'var(--fg-vl)',letterSpacing:'0.1em',textTransform:'uppercase'}}>
                  {card.label}
                </p>
                <p className="font-bold text-2xl leading-none" style={{color:card.color}}>{card.value}</p>
              </div>
            ))}
          </div>

          <div className="mb-8">
            <div className="mono-label">{t.activeProjectLbl}</div>
            {active ? (
              <div className="glass-teal rounded-2xl p-5">
                <h3 className="font-semibold text-base mb-1" style={{color:'var(--fg)'}}>{active.title}</h3>
                <p className="text-sm mb-4" style={{color:'var(--fg-lo)'}}>{active.description}</p>
                <div className="rounded-full overflow-hidden mb-2" style={{height:'4px',background:'var(--surface-hi)'}}>
                  <div style={{height:'100%',width:`${active.totalItems>0?Math.round((active.completedItems/active.totalItems)*100):0}%`,background:'rgba(45,212,165,0.7)',borderRadius:'4px'}} />
                </div>
                <div className="flex items-center justify-between">
                  <p className="font-mono text-xs" style={{color:'var(--fg-vl)'}}>
                    {active.completedItems}/{active.totalItems}
                  </p>
                  {active.rewardUSD > 0 && (
                    <p className="font-mono text-xs" style={{color:'rgba(45,212,165,0.7)'}}>
                      {t.expectedPay((active.rewardUSD/Math.max(active.annotatorIds.length,1)).toFixed(0))}
                    </p>
                  )}
                </div>
              </div>
            ) : (
              <div className="glass rounded-2xl p-8 text-center">
                <p className="font-mono text-sm" style={{color:'var(--fg-ul)'}}>{t.noActiveProject}</p>
              </div>
            )}
          </div>

          <div>
            <div className="mono-label">{t.availableProjectsLbl}</div>
            {available.length === 0 ? (
              <div className="glass rounded-2xl p-8 text-center">
                <p className="font-mono text-sm" style={{color:'var(--fg-ul)'}}>
                  {noProfile ? t.noAvailableNoProfile : t.noAvailableField}
                </p>
              </div>
            ) : (
              <div className="flex flex-col gap-3">
                {available.map(p => (
                  <div key={p.id} className="glass rounded-2xl p-5">
                    <div className="flex items-start justify-between gap-3">
                      <div className="flex-1 min-w-0">
                        <h4 className="font-semibold text-sm mb-1" style={{color:'var(--fg)'}}>{p.title}</h4>
                        <p className="text-xs" style={{color:'var(--fg-lo)'}}>{p.description}</p>
                      </div>
                      {p.rewardUSD > 0 && (
                        <span className="font-mono text-base font-medium flex-shrink-0" style={{color:'#2DD4A5'}}>
                          ${p.rewardUSD.toLocaleString()}
                        </span>
                      )}
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>
      );
    }

    /* ═══════════════════════════════════════════════════════
       APP
    ═══════════════════════════════════════════════════════ */
    function App() {
      const [lang, setLang]   = useLang();
      const [theme, setTheme] = useTheme();
      const [authLoading,    setAuthLoading]    = useState(true);
      const [user,           setUser]           = useState(null);
      const [forbidden,      setForbidden]      = useState(false);
      const [tab,            setTab]            = useState('projects');
      const [projects,       setProjects]       = useState(INITIAL_PROJECTS);
      const [users,          setUsers]          = useState(INITIAL_USERS);
      const [showForm,       setShowForm]       = useState(false);
      const [editTarget,     setEditTarget]     = useState(null);
      const [deleteTarget,   setDeleteTarget]   = useState(null);
      const [userEditTarget, setUserEditTarget] = useState(null);

      useEffect(() => {
        const unsub = auth.onAuthStateChanged(u => {
          if (!u) { setForbidden(true); }
          else {
            const role = localStorage.getItem(`nqsh_role_${u.uid}`);
            if (role !== 'admin') { setForbidden(true); }
            else { setUser({ uid: u.uid, name: u.displayName, email: u.email }); }
          }
          setAuthLoading(false);
        });
        return () => unsub();
      }, []);

      const handleAdd  = useCallback(() => { setEditTarget(null); setShowForm(true); }, []);
      const handleEdit = useCallback(proj => { setEditTarget(proj); setShowForm(true); }, []);

      const handleSave = useCallback(proj => {
        setProjects(ps => {
          const idx = ps.findIndex(p => p.id === proj.id);
          return idx >= 0 ? ps.map(p => p.id === proj.id ? proj : p) : [...ps, proj];
        });
        setShowForm(false); setEditTarget(null);
      }, []);

      const handleDeleteConfirm = useCallback(() => {
        setProjects(ps => ps.filter(p => p.id !== deleteTarget.id));
        setDeleteTarget(null);
      }, [deleteTarget]);

      const handleUserSave = useCallback(updated => {
        setUsers(us => us.map(u => u.uid === updated.uid ? updated : u));
        setUserEditTarget(null);
      }, []);

      const handleSignOut = useCallback(async () => {
        await auth.signOut();
        window.location.href = 'index.html';
      }, []);

      if (authLoading) return <LoadingScreen />;
      if (forbidden)   return <ForbiddenScreen lang={lang} />;

      return (
        <div style={{minHeight:'100vh',background:'var(--bg)',color:'var(--fg)',fontFamily:"'ThmanyahSans', system-ui, sans-serif"}}>
          <AdminHeader user={user} tab={tab} setTab={setTab} onSignOut={handleSignOut}
            lang={lang} setLang={setLang} theme={theme} setTheme={setTheme} />

          <main className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            {tab === 'projects' && (
              <ProjectsTab projects={projects} users={users} onAdd={handleAdd} onEdit={handleEdit} onDelete={setDeleteTarget} lang={lang} />
            )}
            {tab === 'users' && (
              <UsersTab users={users} projects={projects} onEditUser={setUserEditTarget} lang={lang} />
            )}
            {tab === 'annotator' && (
              <AnnotatorView adminUser={user} projects={projects} lang={lang} />
            )}
            {tab === 'client' && (
              <ClientView projects={projects} users={users} lang={lang} />
            )}
          </main>

          {showForm && (
            <ProjectForm initial={editTarget} users={users} onSave={handleSave}
              onClose={() => { setShowForm(false); setEditTarget(null); }} lang={lang} />
          )}
          {deleteTarget && (
            <ConfirmDelete title={deleteTarget.title} onConfirm={handleDeleteConfirm} onClose={()=>setDeleteTarget(null)} lang={lang} />
          )}
          {userEditTarget && (
            <UserForm user={userEditTarget} onSave={handleUserSave} onClose={()=>setUserEditTarget(null)} lang={lang} />
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
